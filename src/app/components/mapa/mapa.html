<div class="controles">
  <button
    class="btn-modo"
    [class.activo]="modoVista() === 'provincias'"
    (click)="cambiarModo('provincias')"
  >
    Provincias
  </button>
  <button
    class="btn-modo"
    [class.activo]="modoVista() === 'comunidades'"
    (click)="cambiarModo('comunidades')"
  >
    Comunidades Autónomas
  </button>
  <button
    class="btn-modo"
    [class.activo]="modoVista() === 'municipios'"
    (click)="cambiarModo('municipios')"
  >
    Municipios
  </button>

  <span class="controles-separador"></span>

  <button class="btn-zoom-reset" title="Restablecer zoom" (click)="resetearZoom()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
      <circle cx="11" cy="11" r="8"/>
      <path d="M21 21l-4.35-4.35M11 8v6M8 11h6"/>
    </svg>
    Reset zoom
  </button>
</div>

<div #contenedor class="mapa-contenedor">
  @if (cargando()) {
    <div class="cargando">
      <div class="cargando-spinner"></div>
      <span>Cargando municipios…</span>
    </div>
  }

  <div #tooltipEl class="tooltip" style="display: none;"></div>
</div>

@if (zonaSeleccionada()) {
  <div class="info-panel">
    <span class="info-nombre">{{ zonaSeleccionada() }}</span>
    <button class="btn-cerrar" (click)="zonaSeleccionada.set(null)">✕</button>
  </div>
}
