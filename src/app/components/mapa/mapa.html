<div class="controles">
  <button
    class="btn-modo"
    [class.activo]="modoVista() === 'provincias'"
    (click)="cambiarModo('provincias')"
  >
    Provincias
  </button>
  <button
    class="btn-modo"
    [class.activo]="modoVista() === 'comunidades'"
    (click)="cambiarModo('comunidades')"
  >
    Comunidades Autónomas
  </button>
</div>

<div #contenedor class="mapa-contenedor">
  @if (tooltip().visible) {
    <div
      class="tooltip"
      [style.left.px]="tooltip().x + 14"
      [style.top.px]="tooltip().y - 36"
    >
      {{ tooltip().texto }}
    </div>
  }
</div>

@if (zonaSeleccionada()) {
  <div class="info-panel">
    <span class="info-nombre">{{ zonaSeleccionada() }}</span>
    <button class="btn-cerrar" (click)="zonaSeleccionada.set(null)">✕</button>
  </div>
}
